# SPDX-License-Identifier: GPL-3.0-or-later
# cargo-deny configuration for Vault.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # paste 1.0.15 — RUSTSEC-2024-0436 (unmaintained, not a vulnerability). A
    # build-time-only proc-macro with no runtime surface, pulled in transitively
    # by ratatui (TUI). The author archived it with no successor we can swap to
    # without dropping ratatui. Revisit when ratatui's tree drops `paste`.
    "RUSTSEC-2024-0436",
]

[licenses]
version = 2
# Vault is GPL-3.0-or-later. Allow GPL-compatible permissive licenses for
# transitive dependencies; refuse anything incompatible.
allow = [
    "GPL-3.0",
    "GPL-3.0-only",
    "GPL-3.0-or-later",
    "LGPL-3.0",
    "LGPL-3.0-or-later",
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    # webpki-roots ships Mozilla's CA certificate bundle under CDLA-Permissive-2.0
    # (a permissive *data* licence, GPL-compatible — it imposes no copyleft on the
    # linking program). Required since webpki-roots 1.0 relicensed to it.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
# The eight `vault-*` crates depend on each other by `path` with no version
# field, which cargo-deny reports as a wildcard. That's intra-workspace, not a
# crates.io `*` constraint, so permit it while still denying real wildcards.
allow-wildcard-paths = true
deny = [
    # No openssl — rustls only.
    { name = "openssl" },
    { name = "openssl-sys" },
    # No native-tls — rustls only.
    { name = "native-tls" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
